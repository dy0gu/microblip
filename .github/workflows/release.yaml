name: release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag-name: ${{ steps.metadata.outputs.tag_name }}
      release-created: ${{ steps.metadata.outputs.release_created }}
    steps:
      - name: Update project metadata and the release pull request
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: metadata
        with:
          config-file: release.json
          manifest-file: .manifest.json

  build:
    needs: [metadata]
    if: ${{ needs.metadata.outputs.release-created }}
    uses: ./.github/workflows/build.yaml
  upload:
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
          path: build
      - name: Append build artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >
          gh release upload
          ${{ needs.metadata.outputs.tag-name }}
          build/microblip.zip
